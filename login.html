<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تسجيل الدخول - World Of Anime</title>
  <link rel="stylesheet" href="../Css/style.css">
  <!-- مكتبة Supabase الجاهزة -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <header>
    <div class="brand">
      <span class="brand-mark">⚡</span>
      <span>World Of Anime</span>
    </div>
    <nav>
      <ul>
        <li><a href="index.html" data-i18n="nav-home">الرئيسية</a></li>
        <li><a href="products.html" data-i18n="nav-products">المنتجات</a></li>
        <li><a href="login.html" class="active" data-i18n="nav-login">تسجيل الدخول</a></li>
        <li><a href="signup.html" data-i18n="nav-signup">إنشاء حساب</a></li>
      </ul>
    </nav>
    <div class="lang-switch" aria-label="language switcher">
      <button class="lang-btn" data-lang="ar">العربية</button>
      <button class="lang-btn" data-lang="en">English</button>
    </div>
  </header>

  <main>
    <section class="auth-card">
      <h2 data-i18n="login-title">🔑 تسجيل الدخول</h2>
      <p data-i18n="login-desc">أدخل بياناتك للوصول إلى حسابك.</p>

      <form id="loginForm">
        <label for="email" data-i18n="email-label">البريد الإلكتروني</label>
        <input type="email" id="email" data-i18n-placeholder="email-placeholder" placeholder="example@email.com" required>

        <label for="password" data-i18n="password-label">كلمة المرور</label>
        <input type="password" id="password" data-i18n-placeholder="password-placeholder" placeholder="••••••••" required>

        <button type="submit" data-i18n="login-button">دخول</button>
      </form>

      <p id="message" style="margin-top: 15px; text-align: center; font-weight: bold;"></p>
      <p class="form-link"><a href="signup.html" data-i18n="signup-link">ليس لديك حساب؟ أنشئ واحداً الآن</a></p>
    </section>
  </main>

  <script src="../js/script.js"></script>
</body>
</html>
